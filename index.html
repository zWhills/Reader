<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Log Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            BATTERY LOG VIEWER
        </div>

        <div class="content">
            <div class="controls">
                <span class="upload-label">Paste your logs below, or load them from the browser:</span>
                <div class="button-group">
                    <button id="loadLocalBtn" class="primary">Check Local Storage</button>
                    <button id="clearViewBtn" class="danger">Clear Viewer</button>
                </div>
            </div>

            <textarea id="logDisplay" class="notepad" placeholder="Paste your battery logs here, or click 'Check Local Storage' if hosted on the same domain..."></textarea>
            
            <div class="status" id="viewerStatus">
                Ready. Waiting for log data.
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
